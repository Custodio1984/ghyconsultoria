<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GHY & NORITSU - Relatório de Atendimento</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #0b1a33;
      color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    /* Cabeçalho compacto */
    header {
      background-color: #13294b;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid #d4af37;
    }
    header img {
      width: 50px;
      margin-right: 15px;
    }
    header .title {
      color: #d4af37;
      font-size: 1.3em;
      font-weight: bold;
    }
    header .subtitle {
      font-size: 0.8em;
      color: #e0e0e0;
      margin-top: -3px;
    }

    /* Corpo */
    .container {
      background-color: #13294b;
      border-radius: 10px;
      padding: 30px;
      max-width: 900px;
      margin: 40px auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      color: #d4af37;
      border-bottom: 1px solid #d4af37;
      padding-bottom: 5px;
      margin-top: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #2e4a7b;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #1e3a63;
      color: #f5f5f5;
    }

    .assinaturas {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      border-top: 1px solid #d4af37;
      padding-top: 20px;
    }

    /* Rodapé */
    footer {
      background-color: #13294b;
      color: #ccc;
      text-align: center;
      padding: 15px 0;
      font-size: 0.9em;
      border-top: 2px solid #d4af37;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- Cabeçalho compacto -->
  <header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Pagoda_icon.svg" alt="Logo">
    <div>
      <div class="title">GHY & NORITSU</div>
      <div class="subtitle">Assessoria Administrativa</div>
    </div>
  </header>

  <!-- Corpo -->
